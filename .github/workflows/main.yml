name: COBOL Check Automation

on:
  push:
    branches: [ main ]

jobs:
  cobol-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Install Zowe CLI
      run: npm install -g @zowe/cli

    - name: Create Zowe Profile
      run: |
       zowe profiles create zosmf mainframe \
        --host ${{ secrets.ZOWE_HOST }} \
        --port 10443 \
        --user ${{ secrets.ZOWE_USERNAME }} \
        --password ${{ secrets.ZOWE_PASSWORD }} \
        --ru false

       zowe profiles set zosmf mainframe

    - name: Test Connectivity
      run: zowe files list ds "ZXP.PUBLIC.*"

    - name: Run COBOL Check
      env:
        ZOWE_USERNAME: ${{ secrets.ZOWE_USERNAME }}
        ZOWE_PASSWORD: ${{ secrets.ZOWE_PASSWORD }}
      run: |
        # Here we'll add our commands
    - name: Setup Mainframe Environment and Upload COBOL Check
      env:
        ZOWE_USERNAME: ${{ secrets.ZOWE_USERNAME }}
        ZOWE_PASSWORD: ${{ secrets.ZOWE_PASSWORD }}
      run: |
        LOWERCASE_USERNAME=$(echo $ZOWE_USERNAME | tr '[:upper:]' '[:lower:]')
        zowe zos-files create uss-directory /z/$LOWERCASE_USERNAME/cobolcheck
