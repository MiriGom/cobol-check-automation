name: COBOL Check Automation

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # optional: lets you manually trigger the workflow

jobs:
  cobol-check:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout repository
    - uses: actions/checkout@v3

    # Step 2: Set up Java (required by COBOL Check)
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'

    # Step 3: Install Zowe CLI
    - name: Install Zowe CLI
      run: npm install -g @zowe/cli@lts

    # Step 4: (Optional) Test Zowe CLI installation
    - name: Test Zowe CLI
      run: zowe --version

    # Step 5: Run COBOL Check script with environment variables
    - name: Setup Mainframe Environment and Upload COBOL Check
      env:
        ZOWE_HOST: ${{ secrets.ZOWE_HOST }}                 # z/OSMF host (from IBM lab)
        ZOWE_PORT: ${{ secrets.ZOWE_PORT }}                 # usually 10443
        ZOWE_USERNAME: ${{ secrets.ZOWE_USERNAME }}         # your mainframe username
        ZOWE_PASSWORD: ${{ secrets.ZOWE_PASSWORD }}         # your mainframe password
        ZOWE_REJECT_UNAUTHORIZED: false                     # required if lab uses self-signed SSL
      run: |
        # Make the script executable
        chmod +x .github/scripts/zowe_operations.sh
        
        # Run the script
        ./.github/scripts/zowe_operations.sh
