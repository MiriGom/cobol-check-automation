name: COBOL Check Automation

on:
  push:
    branches: [ main ]

jobs:
  cobol-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Install Zowe CLI
      run: npm install -g @zowe/cli

    - name: Create Zowe config
      run: |
        cat <<EOF > zowe.config.json
        {
          "profiles": {
            "LearnCOBOL": {
              "properties": {
                "host": "204.90.115.200"
              },
              "profiles": {
                "zosmf": {
                  "type": "zosmf",
                  "properties": {
                    "port": 10443,
                    "user": "${{ secrets.ZOWE_USERNAME }}",
                    "password": "${{ secrets.ZOWE_PASSWORD }}"
                  }
                }
              }
            },
            "base": {
              "type": "base",
              "properties": {
                "rejectUnauthorized": false
              }
            }
          },
          "defaults": {
            "zosmf": "LearnCOBOL.zosmf",
            "base": "base"
          }
        }
        EOF
        
        
    - name: Setup mainframe
      env:
        ZOWE_USERNAME: ${{ secrets.ZOWE_USERNAME }}
        ZOWE_PASSWORD: ${{ secrets.ZOWE_PASSWORD }}
      run: |
        LOWERCASE_USERNAME=$(echo $ZOWE_USERNAME | tr '[:upper:]' '[:lower:]')
        zowe files create uss-directory /z/$LOWERCASE_USERNAME/cobolcheck
